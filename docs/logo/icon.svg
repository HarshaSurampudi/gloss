<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Rounded gradient tile. Colors are sRGB equivalents of the OKLCH
       values used on-screen (oklch(22% 0.08 268), oklch(14% 0.04 268),
       oklch(30% 0.1 268), oklch(75% 0.14 268)) so the PNG rasterizer
       doesn't fall back to black on Chromium versions without OKLCH. -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1D1740"/>
      <stop offset="100%" stop-color="#120E22"/>
    </linearGradient>
  </defs>

  <rect
    x="0.5" y="0.5"
    width="127" height="127"
    rx="28"
    fill="url(#tile)"
    stroke="#2B2352"
    stroke-width="1"/>

  <!-- 8-ray burst glyph. viewBox 24x24 upscaled into a 56×56 inner region
       centered at (64,64). Stroke-width 1.3 in viewBox space ≈ 3px visual. -->
  <svg x="36" y="36" width="56" height="56" viewBox="0 0 24 24"
       fill="none"
       stroke="#A197F2"
       stroke-width="1.3"
       stroke-linecap="round"
       stroke-linejoin="round">
    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
  </svg>
</svg>
